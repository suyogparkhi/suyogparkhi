name: Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate languages chart (incl. private + org repos)
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: python3 scripts/gen_langs.py > /tmp/metrics-languages.svg

      - name: Commit languages chart to metrics branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin metrics
          git checkout metrics
          cp /tmp/metrics-languages.svg metrics-languages.svg
          git add metrics-languages.svg
          git diff --cached --quiet || git commit -m "chore: update language metrics"
          git push origin metrics

      - name: Contribution calendar (incl. private)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: suyogparkhi
          base: ""
          filename: metrics-isocalendar.svg
          committer_branch: metrics
          committer_message: "chore: update calendar metrics"
          config_timezone: Asia/Kolkata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
