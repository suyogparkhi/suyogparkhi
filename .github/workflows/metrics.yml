name: Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Languages (incl. private + org repos)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: suyogparkhi
          base: ""
          filename: metrics-languages.svg
          committer_branch: metrics
          committer_message: "chore: update language metrics"
          config_timezone: Asia/Kolkata
          repositories_affiliations: owner, collaborator, organization_member
          repositories: 400
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css, scss, jupyter notebook, makefile, dockerfile

      - name: Contribution calendar (incl. private)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: suyogparkhi
          base: ""
          filename: metrics-isocalendar.svg
          committer_branch: metrics
          committer_message: "chore: update calendar metrics"
          config_timezone: Asia/Kolkata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
